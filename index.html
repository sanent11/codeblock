<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBlock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "container">
        <div class = "sidebar">

            <p class="sidebar_title">Блоки</p>
            
            <div class="block" data-type="intVar" draggable="true">Переменные</div>
            <div class="block" data-type="assignInt" draggable="true">Присваивание</div>
            <div class="block" draggable="true">Арифметические операции</div>
            <div class="block" draggable="true">Условие</div>
            

        </div>

        <div class = "workspace">

            <p class="workspace_title">Рабочая область</p>

        </div>
        <button class="clear">Очистить</button>
    </div>
    
    
    <div class="console"></div>
    <script src="js/block.js"></script>
    <script src="js/block_drag.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
